<script>
const PW_HASH = 'bdcc12a7a798dca1561aa689f730c868efc20177f622632abe814557e9465c6c';
const SESSION_KEY = 'spectacles_auth';

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}
async function checkPassword() {
  const hash = await sha256(document.getElementById('pwInput').value);
  if (hash === PW_HASH) { sessionStorage.setItem(SESSION_KEY, '1'); showApp(); }
  else document.getElementById('pwError').style.display = 'block';
}
function showApp() {
  document.getElementById('gate').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  showPage('overview');
}
function logout() { sessionStorage.removeItem(SESSION_KEY); location.reload(); }
document.getElementById('pwBtn').onclick = checkPassword;
document.getElementById('pwInput').onkeydown = e => { if (e.key === 'Enter') checkPassword(); };
if (sessionStorage.getItem(SESSION_KEY)) showApp();

scripts: `
<div class="breadcrumb">SpectaclesUIKit <span>›</span> Скрипти</div>
<h1>SpawnCubeOnPress</h1>
<p class="subtitle">Скрипт, який створює 3D кубик (prefab) при натисканні UIKit кнопки.</p>

<h2>Вихідний код</h2>
<div class="code-block"><div class="code-header"><span class="code-tab active">SpawnCubeOnPress.ts</span><button class="code-copy" onclick="copyCode(this)">Копіювати</button></div>
<div class="code-body"><pre><code>@component
export class SpawnCubeOnPress extends BaseScriptComponent {
  @input
  cubePrefab: ObjectPrefab

  @input
  parentObject: SceneObject

  spawnCube() {
    const cube = this.cubePrefab.instantiate(this.parentObject)
    cube.getTransform().setLocalPosition(new vec3(0, 0, -50))
    cube.getTransform().setLocalScale(new vec3(5, 5, 5))
    print("Cube spawned!")
  }
}</code></pre></div></div>

<h2>Інструкція з налаштування</h2>
<ol class="steps">
<li><strong>Створіть Box Prefab</strong><br>В Lens Studio: <code>+ &gt; Mesh &gt; Box</code>. Налаштуйте матеріал. Перетягніть з Scene Hierarchy у панель <strong>Resources</strong> щоб створити <code>.prefab</code>. Видаліть оригінал зі сцени.</li>
<li><strong>Додайте скрипт</strong><br>Створіть файл <code>SpawnCubeOnPress.ts</code> в Assets. Вставте код вище.</li>
<li><strong>Прикріпіть до SceneObject</strong><br>Додайте скрипт як компонент на будь-який SceneObject. В Inspector встановіть:<br>• <strong>Cube Prefab</strong> = ваш Box .prefab з Resources<br>• <strong>Parent Object</strong> = об'єкт, де мають з'являтись кубики</li>
<li><strong>Підключіть до кнопки</strong><br>Виберіть UIKit кнопку. Увімкніть <strong>Add Callbacks</strong>. В <strong>On Trigger Up Callbacks</strong> натисніть <code>+</code>:<br>• <strong>Script</strong> = перетягніть компонент SpawnCubeOnPress<br>• <strong>Function Name</strong> = <code>spawnCube</code></li>
<li><strong>Тестуйте</strong><br>Натисніть Play. Зробіть pinch/клік на кнопку. З'явиться кубик і в Logger буде <code>"Cube spawned!"</code>.</li>

function showPage(id) {
  document.getElementById('pageContent').innerHTML = pages[id] || pages.overview;
  document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
  document.querySelectorAll('.sidebar-link').forEach(l => {
    if (l.getAttribute('onclick')?.includes("'" + id + "'")) l.classList.add('active');
  });
  document.querySelectorAll('.topbar-nav a').forEach(a => a.classList.remove('active'));
  document.querySelector('.sidebar')?.classList.remove('open');
  window.scrollTo(0, 0);
  if (id === 'notes') renderNotes();
}

function copyCode(btn) {
  const code = btn.closest('.code-block').querySelector('code').textContent;
  navigator.clipboard.writeText(code);
  btn.textContent = 'Скопійовано!';
  setTimeout(() => btn.textContent = 'Копіювати', 1500);
}

const NOTES_KEY = 'spectacles_notes';
let projectNotes = [];
let editingNoteId = null;

function loadProjectNotes() {
  try { projectNotes = JSON.parse(localStorage.getItem(NOTES_KEY)) || []; } catch { projectNotes = []; }
}
function saveProjectNotes() { localStorage.setItem(NOTES_KEY, JSON.stringify(projectNotes)); }

function renderNotes() {
  loadProjectNotes();
  const c = document.getElementById('notesContainer');
  if (!c) return;
  if (projectNotes.length === 0) {
    c.innerHTML = '<div class="callout callout-info"><span class="callout-icon">📝</span><p>Нотаток ще немає. Натисніть <strong>+ Нова нотатка</strong> щоб створити.</p></div>';
    return;
  }
  c.innerHTML = projectNotes.map(n => `
    <div style="padding:16px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px;cursor:pointer;transition:.15s" onmouseover="this.style.borderColor='var(--border2)'" onmouseout="this.style.borderColor='var(--border)'" onclick="editNote('${n.id}')">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <strong>${esc(n.title)}</strong>
        <span style="font-size:.75rem;background:var(--bg2);padding:2px 8px;border-radius:4px;color:var(--text2)">${n.category}</span>
      </div>
      <div style="font-size:.82rem;color:var(--text3)">${timeAgo(n.updated)}</div>
    </div>
  `).join('');
}

function createNote() {
  const n = {id: Date.now().toString(36), title:'', body:'', category:'general',
    created:new Date().toISOString(), updated:new Date().toISOString()};
  loadProjectNotes(); projectNotes.unshift(n); saveProjectNotes(); editNote(n.id);
}
function editNote(id) {
  loadProjectNotes();
  const n = projectNotes.find(x => x.id === id);
  if (!n) return;
  editingNoteId = id;
  document.getElementById('noteEditor').style.display = 'block';
  document.getElementById('noteTitle').value = n.title;
  document.getElementById('noteBody').value = n.body;
  document.getElementById('noteCategory').value = n.category;
}
function saveCurrentNote() {
  const n = projectNotes.find(x => x.id === editingNoteId);
  if (!n) return;
  n.title = document.getElementById('noteTitle').value || 'Без назви';
  n.body = document.getElementById('noteBody').value;
  n.category = document.getElementById('noteCategory').value;
  n.updated = new Date().toISOString();
  saveProjectNotes(); cancelEdit(); renderNotes();
}
function cancelEdit() { editingNoteId = null; document.getElementById('noteEditor').style.display = 'none'; }
function deleteCurrentNote() {
  if (!confirm('Видалити цю нотатку?')) return;
  projectNotes = projectNotes.filter(n => n.id !== editingNoteId);
  saveProjectNotes(); cancelEdit(); renderNotes();
}
function exportNotes() {
  loadProjectNotes();
  const blob = new Blob([JSON.stringify(projectNotes, null, 2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'spectacles-notes-' + new Date().toISOString().slice(0,10) + '.json'; a.click();
}
function showImportPrompt() {
  const json = prompt('Вставте експортований JSON:');
  if (!json) return;
  try {
    const data = JSON.parse(json);
    if (!Array.isArray(data)) throw 0;
    loadProjectNotes();
    const ids = new Set(projectNotes.map(n => n.id));
    let added = 0;
    data.forEach(n => { if (n.id && !ids.has(n.id)) { projectNotes.unshift(n); added++; }});
    saveProjectNotes(); renderNotes();
    alert('Імпортовано ' + added + ' нотаток');
  } catch { alert('Невірний JSON формат'); }
}
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function timeAgo(iso) {
  const d = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (d < 60) return 'щойно'; if (d < 3600) return Math.floor(d/60) + ' хв тому';
  if (d < 86400) return Math.floor(d/3600) + ' год тому'; return Math.floor(d/86400) + ' дн тому';
}
</script>
